# Q30 benchmark: primer-only, single-end (R1), baseline DADA2
run_label: benchmark_q30_SE_primer

adapter_trim: true
poly_g_trim: true
quality_trim: true
apply_min_length: true
quality_cutoff: 30

preprocess_method: primer
analysis_mode: single

primer_fwd: "GTGARTCATCGAATCTTTG"
primer_rev: "TCCTCCGCTTATTGATATGC"
primer_fwd_adapter: "GCATATCAATAAGCGGAGGA"
primer_rev_adapter: "CAAAGATTCGATGAYTCAC"
primer_discard_untrimmed: false

dada2_trim_left_f: 0
dada2_trim_left_r: 0
dada2_trunc_len_f: 0
dada2_trunc_len_r: 0
dada2_max_ee_f: 2.0
dada2_max_ee_r: 2.0

dada2_trim_left: 0
dada2_trunc_len: 0
dada2_max_ee: 2.0
dada2_trunc_q: 2
dada2_min_overlap: 12
dada2_max_merge_mismatch: 0
dada2_trim_overhang: false
dada2_pooling_method: independent
dada2_chimera_method: consensus
dada2_n_reads_learn: 1000000

taxonomy_enabled: true
blast_refseq_enabled: true
